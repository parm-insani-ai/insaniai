# Alembic configuration for insani backend
#
# To create a migration after changing models:
#   alembic revision --autogenerate -m "description of change"
#
# To apply migrations:
#   alembic upgrade head
#
# To see current version:
#   alembic current

[alembic]
script_location = alembic
# Database URL is loaded from app/config.py in env.py (not set here)
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
